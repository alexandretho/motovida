services:
  mysql:
    image: mysql:8.0
    container_name: motovida-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootmotovida}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-motovida}
      MYSQL_USER: ${MYSQL_USER:-motovida}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-motovida123}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootmotovida}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  app:
    build: ./backend
    container_name: motovida-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-motovida}
      MYSQL_USER: ${MYSQL_USER:-motovida}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-motovida123}
      SECRET_KEY: ${SECRET_KEY:-troque-esta-chave-em-producao}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@motovida.org.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    expose:
      - "8000"
    networks:
      - default

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: motovida-npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - default      # alcança motovida-app
      - npm_shared   # alcança apps de outros projetos

networks:
  default:
  npm_shared:
    external: true

volumes:
  mysql_data:
  npm_data:
  npm_letsencrypt:
